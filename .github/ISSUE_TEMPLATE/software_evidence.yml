name: Software evidence
description: Record a software-track observation in a comparable format.
title: "[Software Evidence] "
labels: ["investigation", "area: software-track"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for `software`-track bounded runs that are worth keeping as reusable evidence.
        Do not open one issue per raw log sample. Raw logs, temporary notes, and unpromoted observations can stay in local artifacts or in the umbrella software investigation issue.
        This form may be filled manually or from a raw-log managed triage comment after a maintainer copies and edits the `maintainer_reply` block.
        Keep the report factual and scoped to one observation window that can stand on its own later.
        If the claim is about office-demand response, keep `officeDemand(...)` in the copied counters instead of only summarizing demand behavior in prose.
        If the active question is why zero-software consumers are stuck, preserve `softwareConsumerBuyerState(...)` and the consumer-side `softwareNeed(...)`, `softwareTradeCost(...)`, and `softwareAcquisitionState(...)` detail blocks.
        Canonical schema: `.github/software-evidence-schema.md`
        If you have current mod logs, prefer copying values directly from `softwareEvidenceDiagnostics`.
  - type: input
    id: game-version
    attributes:
      label: Game version
      placeholder: 1.3.xf1
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Mod version
      placeholder: current release or unreleased
    validations:
      required: true
  - type: input
    id: mod-ref
    attributes:
      label: Mod ref
      description: Optional branch and commit SHA, or another exact source reference for dev or local builds.
      placeholder: track/software-instability @ abc1234
  - type: textarea
    id: settings
    attributes:
      label: Settings
      description: Copy only the `settings=...` portion from `environment(settings=..., patch_state=...)` when available. Current logs may include `EnableOutsideConnectionVirtualSellerFix`; older logs may include retired legacy fields such as `EnableTradePatch`. Keep captured fields exactly as logged.
      placeholder: |
        EnablePhantomVacancyFix:True,EnableOutsideConnectionVirtualSellerFix:False,EnableDemandDiagnostics:True,DiagnosticsSamplesPerDay:2,CaptureStableEvidence:False,VerboseLogging:False
    validations:
      required: true
  - type: input
    id: patch-state
    attributes:
      label: Patch state
      description: Copy `patch_state=...` from diagnostics when available. If runtime logs `unknown`, replace it only if you know the exact local deviations for this run.
      placeholder: unknown or debug-build
    validations:
      required: true
  - type: textarea
    id: platform-notes
    attributes:
      label: Platform notes
      description: Optional platform, install-layout, or environment notes that may matter for comparison.
  - type: textarea
    id: other-mods
    attributes:
      label: Other mods
      description: Optional list of other mods only if they may affect office demand, trade, property, or company behavior.
  - type: input
    id: scenario-label
    attributes:
      label: Scenario label
      placeholder: Save name, city name, or a stable test label
    validations:
      required: true
  - type: dropdown
    id: scenario-type
    attributes:
      label: Scenario type
      options:
        - existing save
        - fresh city
        - reproduced test case
        - synthetic diagnostic run
        - other
    validations:
      required: true
  - type: textarea
    id: reproduction-conditions
    attributes:
      label: Reproduction conditions
      description: What state the city was in, or what you did before collecting evidence.
    validations:
      required: true
  - type: input
    id: observation-window
    attributes:
      label: Observation window
      description: Prefer copying the full `softwareEvidenceDiagnostics observation_window(...)` entry, including sample-slot fields when present, then expand if you need more narrative context.
      placeholder: session_id=20260309T083500123Z, run_id=2, start_day=412, end_day=419, start_sample_index=824, end_sample_index=839, sample_day=419, sample_index=839, sample_slot=1, samples_per_day=2, sample_count=16, trigger=capture_stable_evidence
    validations:
      required: true
  - type: textarea
    id: comparison-baseline
    attributes:
      label: Comparison baseline
      description: Optional save, version, settings state, or prior evidence entry that should be referenced later from the umbrella investigation issue.
  - type: dropdown
    id: symptom-classification
    attributes:
      label: Symptom classification
      options:
        - software_office_propertyless
        - software_office_efficiency_zero
        - software_office_lack_resources_zero
        - software_demand_mismatch
        - software_track_unclear
        - other
    validations:
      required: true
  - type: input
    id: custom-symptom-classification
    attributes:
      label: Custom symptom classification
      description: Fill this only if you selected `other`. Use a short stable label, not a prose sentence.
      placeholder: custom_short_label
  - type: textarea
    id: diagnostic-counters
    attributes:
      label: Diagnostic counters
      description: Copy the `diagnostic_counters(...)` portion from `softwareEvidenceDiagnostics` with minimal editing. Include `electronics(...)` and the producer/consumer office counter groups when they matter for the hypothesis under test. If the claim involves office-demand response, keep `officeDemand(...)` intact.
      placeholder: |
        officeDemand(building=..., company=..., emptyBuildings=..., buildingDemand=...)
        freeOfficeProperties(total=..., software=..., inOccupiedBuildings=..., softwareInOccupiedBuildings=...)
        onMarketOfficeProperties(total=..., activelyVacant=..., occupied=..., staleRenterOnly=...)
        phantomVacancy(signatureOccupiedOnMarketOffice=..., signatureOccupiedOnMarketIndustrial=..., signatureOccupiedToBeOnMarket=..., nonSignatureOccupiedOnMarketOffice=..., nonSignatureOccupiedOnMarketIndustrial=..., guardCorrections=...)
        software(resourceProduction=..., resourceDemand=..., companies=..., propertyless=...)
        electronics(resourceProduction=..., resourceDemand=..., companies=..., propertyless=...)
        softwareProducerOffices(total=..., propertyless=..., efficiencyZero=..., lackResourcesZero=...)
        softwareConsumerOffices(total=..., propertyless=..., efficiencyZero=..., lackResourcesZero=..., softwareInputZero=...)
        softwareConsumerBuyerState(needSelected=..., resourceBuyerPresent=..., trackingExpectedSelected=..., selectedNoResourceBuyer=..., selectedRequestNoPath=..., pathPending=..., resolvedVirtualNoTrackingExpected=..., resolvedNoTrackingUnexpected=..., tripPresent=..., currentTradingPresent=...)
    validations:
      required: true
  - type: textarea
    id: log-excerpt
    attributes:
      label: Log excerpt
      description: Optional short excerpts or references to the specific `softwareEvidenceDiagnostics` lines that matter most for this entry. Include `detail_type=softwareOfficeStates` when producer-side or consumer-side office input state matters, especially if consumer acquisition-state blocks such as `softwareNeed(...)`, `softwareTradeCost(...)`, or `softwareAcquisitionState(...)` matter.
  - type: textarea
    id: evidence-summary
    attributes:
      label: Evidence summary
      description: One short factual summary of what happened.
    validations:
      required: true
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: confounders
    attributes:
      label: Confounders
      description: Known uncertainties or alternative explanations, such as upstream input pressure, downstream trade or storage gating, or mixed interventions. Use `none known` if none stand out.
    validations:
      required: true
  - type: textarea
    id: analysis-basis
    attributes:
      label: Analysis basis
      description: Optional. If code reading informed the interpretation, say whether the relevant claim came from vanilla decompiled game code, this mod's code, or both.
      placeholder: vanilla decompile for trade lifecycle and virtual-resource handling; mod code for diagnostics output and local patch behavior
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Logs, saves, screenshots, or other references. Include relevant `softwareEvidenceDiagnostics detail(...)` lines here when useful, especially `detail_type=softwareOfficeStates` with role-aware producer/consumer detail and any consumer buyer-state blocks needed for later analysis.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Extra context that does not fit the structured fields. Use this to record office-demand mismatch context if software distress and demand counters point in different directions.
