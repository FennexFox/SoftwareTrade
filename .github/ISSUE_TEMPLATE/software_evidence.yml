name: Software evidence
description: Record a software-track observation in a comparable format.
title: "[Software Evidence] "
labels: ["investigation", "area: software-track"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for `software`-track evidence entries.
        Keep the report factual and scoped to one observation window.
        Canonical schema: `.github/software-evidence-schema.md`
        If you have current mod logs, prefer copying values directly from `softwareEvidenceDiagnostics`.
  - type: input
    id: game-version
    attributes:
      label: Game version
      placeholder: 1.3.xf1
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Mod version
      placeholder: 0.1.1 or unreleased
    validations:
      required: true
  - type: input
    id: mod-ref
    attributes:
      label: Mod ref
      description: Branch and commit SHA, or another exact source reference.
      placeholder: track/software-instability @ abc1234
    validations:
      required: true
  - type: textarea
    id: settings
    attributes:
      label: Settings and patch state
      description: Copy the `environment(settings=..., patch_state=...)` portion from `softwareEvidenceDiagnostics` when available, then add any missing context.
      placeholder: |
        settings=EnableTradePatch:false,EnablePhantomVacancyFix:true,EnableDemandDiagnostics:true,VerboseLogging:false
        patch_state=no-local-diagnostics-deviations
    validations:
      required: true
  - type: input
    id: scenario-label
    attributes:
      label: Scenario label
      placeholder: Save name, city name, or a stable test label
    validations:
      required: true
  - type: dropdown
    id: scenario-type
    attributes:
      label: Scenario type
      options:
        - existing save
        - fresh city
        - reproduced test case
        - synthetic diagnostic run
        - other
    validations:
      required: true
  - type: textarea
    id: reproduction-conditions
    attributes:
      label: Reproduction conditions
      description: What state the city was in, or what you did before collecting evidence.
    validations:
      required: true
  - type: input
    id: observation-window
    attributes:
      label: Observation window
      description: Prefer the window used in `softwareEvidenceDiagnostics observation_window(...)`, then expand if needed.
      placeholder: day=419, or days 412-419 for a bounded run
    validations:
      required: true
  - type: dropdown
    id: symptom-classification
    attributes:
      label: Symptom classification
      options:
        - software_office_propertyless
        - software_office_efficiency_zero
        - software_office_lack_resources_zero
        - software_demand_mismatch
        - software_track_unclear
        - other
    validations:
      required: true
  - type: textarea
    id: diagnostic-counters
    attributes:
      label: Diagnostic counters
      description: Copy the `diagnostic_counters(...)` portion from `softwareEvidenceDiagnostics` with minimal editing.
      placeholder: |
        officeDemand(building=..., company=..., emptyBuildings=..., buildingDemand=...)
        freeOfficeProperties(total=..., software=..., inOccupiedBuildings=..., softwareInOccupiedBuildings=...)
        onMarketOfficeProperties(total=..., activelyVacant=..., occupied=..., staleRenterOnly=...)
        phantomVacancy(signatureOccupiedOnMarketOffice=..., signatureOccupiedOnMarketIndustrial=..., signatureOccupiedToBeOnMarket=..., nonSignatureOccupiedOnMarketOffice=..., nonSignatureOccupiedOnMarketIndustrial=..., guardCorrections=...)
        software(resourceProduction=..., resourceDemand=..., companies=..., propertyless=...)
        softwareOffices(total=..., propertyless=..., efficiencyZero=..., lackResourcesZero=...)
    validations:
      required: true
  - type: textarea
    id: evidence-summary
    attributes:
      label: Evidence summary
      description: One short factual summary of what happened.
    validations:
      required: true
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: confounders
    attributes:
      label: Confounders
      description: Known uncertainties or alternative explanations. Use `none known` if none stand out.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Logs, saves, screenshots, or other references. Include `softwareEvidenceDiagnostics detail(...)` lines here when relevant.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Extra context that does not fit the structured fields.
