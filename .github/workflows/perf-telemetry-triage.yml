name: Performance Telemetry Triage

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: >-
      github.event.issue.state == 'open' && (
        contains(github.event.issue.body, '<!-- performance-telemetry-report -->') || (
          startsWith(github.event.issue.title, '[Performance Telemetry]') &&
          contains(github.event.issue.body, '### Game version') &&
          contains(github.event.issue.body, '### Mod version') &&
          contains(github.event.issue.body, '### Save or city label') &&
          contains(github.event.issue.body, '### What changed') &&
          contains(github.event.issue.body, '### Baseline telemetry bundle')
        )
      )
    runs-on: ubuntu-latest
    concurrency:
      group: perf-telemetry-triage-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python automation tests
        run: python -m unittest discover -s .github/scripts/tests -p "test_*.py"

      - name: Run performance telemetry triage
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/run_perf_telemetry_triage.py
