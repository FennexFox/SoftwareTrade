name: Retriage Raw Log From Comment

on:
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: read
  issues: write
  models: read

jobs:
  retriage:
    if: >-
      github.event.issue.state == 'open' &&
      contains(github.event.comment.body, '/retriage') &&
      !contains(github.event.comment.body, '/promote-evidence')
    runs-on: ubuntu-latest
    concurrency:
      group: retriage-raw-log-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python automation tests
        run: python -m unittest discover -s .github/scripts/tests -p "test_*.py"

      - name: Re-triage raw log issue from maintainer comment
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/run_retriage_comment.py
