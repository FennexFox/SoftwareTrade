name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_PATH: NoOfficeDemandFix/NoOfficeDemandFix.csproj
  PUBLISH_CONFIGURATION_PATH: NoOfficeDemandFix/Properties/PublishConfiguration.xml
  MOD_NAME: NoOfficeDemandFix

jobs:
  publish:
    name: Build and Publish
    runs-on:
      - self-hosted
      - Windows
    timeout-minutes: 30

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate CSL2 toolchain
        run: |
          $requiredEnvVars = @(
            "CSII_TOOLPATH",
            "CSII_MANAGEDPATH",
            "CSII_USERDATAPATH",
            "CSII_LOCALMODSPATH",
            "CSII_UNITYMODPROJECTPATH",
            "CSII_MODPOSTPROCESSORPATH",
            "CSII_MODPUBLISHERPATH",
            "CSII_MSCORLIBPATH",
            "CSII_ENTITIESVERSION"
          )

          $missing = foreach ($name in $requiredEnvVars) {
            $value = (Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value
            if ([string]::IsNullOrWhiteSpace($value)) {
              $name
            }
          }

          if ($missing) {
            throw "Missing required CSII environment variables: $($missing -join ', ')"
          }

          $pathsToCheck = @(
            @{ Name = "CSII_MANAGEDPATH"; Path = $env:CSII_MANAGEDPATH; Type = "Container" },
            @{ Name = "CSII_USERDATAPATH"; Path = $env:CSII_USERDATAPATH; Type = "Container" },
            @{ Name = "CSII_LOCALMODSPATH"; Path = $env:CSII_LOCALMODSPATH; Type = "Container" },
            @{ Name = "CSII_UNITYMODPROJECTPATH"; Path = $env:CSII_UNITYMODPROJECTPATH; Type = "Container" },
            @{ Name = "CSII_MODPOSTPROCESSORPATH"; Path = $env:CSII_MODPOSTPROCESSORPATH; Type = "Leaf" },
            @{ Name = "CSII_MODPUBLISHERPATH"; Path = $env:CSII_MODPUBLISHERPATH; Type = "Leaf" },
            @{ Name = "CSII_MSCORLIBPATH"; Path = $env:CSII_MSCORLIBPATH; Type = "Leaf" }
          )

          foreach ($entry in $pathsToCheck) {
            if (-not (Test-Path -LiteralPath $entry.Path -PathType $entry.Type)) {
              throw "$($entry.Name) points to a missing path: $($entry.Path)"
            }
          }

          $gameDll = Join-Path $env:CSII_MANAGEDPATH "Game.dll"
          if (-not (Test-Path -LiteralPath $gameDll -PathType Leaf)) {
            throw "Game.dll was not found in CSII_MANAGEDPATH: $gameDll"
          }

      - name: Validate Paradox secrets
        env:
          PDX_EMAIL: ${{ secrets.PDX_EMAIL }}
          PDX_PASSWORD: ${{ secrets.PDX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PDX_EMAIL) -or [string]::IsNullOrWhiteSpace($env:PDX_PASSWORD)) {
            throw "GitHub secrets PDX_EMAIL and PDX_PASSWORD are required."
          }

      - name: Derive release metadata
        id: meta
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          $assetName = "{0}-{1}.zip" -f $env:MOD_NAME, $tag

          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset_name=$assetName"

      - name: Select publish command
        id: publish_command
        run: |
          [xml]$config = Get-Content -LiteralPath $env:PUBLISH_CONFIGURATION_PATH
          $modId = $config.Publish.ModId.Value
          $command = if ([string]::IsNullOrWhiteSpace($modId)) { "Publish" } else { "NewVersion" }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "command=$command"

      - name: Stamp mod version from tag
        run: |
          $configPath = (Resolve-Path -LiteralPath $env:PUBLISH_CONFIGURATION_PATH).Path
          [xml]$config = Get-Content -LiteralPath $configPath
          $config.Publish.ModVersion.Value = "${{ steps.meta.outputs.version }}"
          $config.Save($configPath)

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH -c Release --no-restore

      - name: Publish to Paradox Mods
        env:
          PDX_EMAIL: ${{ secrets.PDX_EMAIL }}
          PDX_PASSWORD: ${{ secrets.PDX_PASSWORD }}
        run: |
          $deployDir = Join-Path $env:CSII_LOCALMODSPATH $env:MOD_NAME
          $configPath = (Resolve-Path -LiteralPath $env:PUBLISH_CONFIGURATION_PATH).Path

          if (-not (Test-Path -LiteralPath $deployDir -PathType Container)) {
            throw "Expected deploy directory was not created: $deployDir"
          }

          & $env:CSII_MODPUBLISHERPATH `
            "${{ steps.publish_command.outputs.command }}" `
            $configPath `
            --contentFolder $deployDir `
            --email $env:PDX_EMAIL `
            --password $env:PDX_PASSWORD `
            --noAutoLogin `
            --verbose

          if ($LASTEXITCODE -ne 0) {
            throw "ModPublisher failed with exit code $LASTEXITCODE."
          }

      - name: Package release asset
        id: package
        run: |
          $deployDir = Join-Path $env:CSII_LOCALMODSPATH $env:MOD_NAME
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ steps.meta.outputs.asset_name }}"

          if (Test-Path -LiteralPath $assetPath) {
            Remove-Item -LiteralPath $assetPath -Force
          }

          Compress-Archive -Path $deployDir -DestinationPath $assetPath
          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset_path=$assetPath"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.asset_path }}
          overwrite_files: true
